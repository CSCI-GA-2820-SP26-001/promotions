<!DOCTYPE html>
<html>
  <head>
    <title>Promotion RESTful Service</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="static/images/newapp-icon.png">
    <link rel="stylesheet" href="static/css/cerulean_bootstrap.min.css">
  </head>
  <body>
    <div class="container">
      <div class="page-header">
          <h1>Promotion REST API Service</h1>
      </div>

      <!-- Flash Message -->
      <div class="table-responsive">
        <table class="table">
          <tr><td>Status:</td><td><span id="flash_message"></span></td></tr>
        </table>
      </div>

      <!-- FORM -->
      <div class="col-md-12" id="form_data">
        <h3>Create, Retrieve, Update, and Delete a Promotion:</h3>
        <div class="well">
          <div class="form-horizontal">
            <div class="form-group">
              <label class="control-label col-sm-2" for="pet_id">Promotion ID:</label>
              <div class="col-sm-6">
                <input type="text" class="form-control" id="pet_id" placeholder="Enter ID of Promotion">
              </div>
              <div class="col-sm-4">
                <button type="submit" class="btn btn-primary" id="retrieve-btn">Retrieve</button>
                <button type="submit" class="btn btn-danger" id="delete-btn">Delete</button>
              </div>
            </div>
          </div> <!-- form horizontal -->

          <div class="form-horizontal">

            <!-- NAME -->
            <div class="form-group">
              <label class="control-label col-sm-2" for="pet_name">Name:</label>
              <div class="col-sm-10">
                <input type="text" class="form-control" id="pet_name" placeholder="Enter name for Promotion">
              </div>
            </div>

            <!-- DESCRIPTION (id pet_category) -->
            <div class="form-group">
              <label class="control-label col-sm-2" for="pet_category">Description:</label>
              <div class="col-sm-10">
                <input type="text" class="form-control" id="pet_category" placeholder="Enter description">
              </div>
            </div>

            <!-- PROMO CODE -->
            <div class="form-group">
              <label class="control-label col-sm-2" for="promo_code">Promo code:</label>
              <div class="col-sm-10">
                <input type="text" class="form-control" id="promo_code" placeholder="Enter promo code">
              </div>
            </div>

            <!-- DISCOUNT AMOUNT -->
            <div class="form-group">
              <label class="control-label col-sm-2" for="discount_amount">Discount amount:</label>
              <div class="col-sm-10">
                <input type="number" step="0.01" class="form-control" id="discount_amount" placeholder="0.00">
              </div>
            </div>

            <!-- PROMOTION TYPE (id pet_gender) -->
            <div class="form-group">
              <label class="control-label col-sm-2" for="pet_gender">Promotion type:</label>
              <div class="col-sm-10">
                <select class="form-control" id="pet_gender">
                  <option value="">Any</option>
                  <option value="percentage" selected>percentage</option>
                  <option value="fixed_amount">fixed_amount</option>
                </select>
              </div>
            </div>

            <!-- START DATE (id pet_birthday) -->
            <div class="form-group">
              <label class="control-label col-sm-2" for="pet_birthday">Start date:</label>
              <div class="col-sm-10">
                <input type="date" class="form-control" id="pet_birthday" placeholder="2020-04-01">
              </div>
            </div>

            <!-- END DATE -->
            <div class="form-group">
              <label class="control-label col-sm-2" for="end_date">End date:</label>
              <div class="col-sm-10">
                <input type="date" class="form-control" id="end_date" placeholder="2020-12-31">
              </div>
            </div>

            <!-- IS_ACTIVE (id pet_available) -->
            <div class="form-group">
              <label class="control-label col-sm-2" for="pet_available">Active:</label>
              <div class="col-sm-10">
                <select class="form-control" id="pet_available">
                  <option value="">Any</option>
                  <option value="true" selected>True</option>
                  <option value="false">False</option>
                </select>
              </div>
            </div>

            <!-- PRODUCT ID -->
            <div class="form-group">
              <label class="control-label col-sm-2" for="product_id">Product ID:</label>
              <div class="col-sm-10">
                <input type="number" class="form-control" id="product_id" placeholder="1">
              </div>
            </div>


            <!-- SUBMIT BUTTONS -->
            <div class="form-group">
              <div class="col-sm-offset-2 col-sm-10">
                <button type="submit" class="btn btn-primary" id="search-btn">Search</button>
                <button type="submit" class="btn btn-primary" id="clear-btn">Clear</button>
                <button type="submit" class="btn btn-success" id="create-btn">Create</button>
                <button type="submit" class="btn btn-warning" id="update-btn">Update</button>
                <button type="submit" class="btn btn-success" id="activate-btn">Activate</button>
                <button type="submit" class="btn btn-default" id="deactivate-btn">Deactivate</button>
              </div>
            </div>
          </div> <!-- form horizontal -->
        </div> <!-- end well -->
      </div> <!-- end Form -->

      <!-- Search Results -->
      <div class="table-responsive col-md-12" id="search_results">
        <table class="table table-striped">
          <thead>
          <tr>
            <th class="col-md-1">ID</th>
            <th class="col-md-2">Name</th>
            <th class="col-md-2">Type</th>
            <th class="col-md-1">Active</th>
            <th class="col-md-1">Product</th>
            <th class="col-md-2">Start</th>
            <th class="col-md-2">End</th>
          </tr>
          </thead>
        </table>
      </div>

      <footer>
        <br><br>
        <p>&copy; NYU DevOps Company 2022</p>
      </footer>

    </div> <!-- container -->

  <script type="text/javascript" src = "static/js/jquery-3.6.0.min.js"></script>
  <script type="text/javascript" src = "static/js/bootstrap.min.js"></script>

  <!-- YOUR REST API -->
  <script type="text/javascript" src="static/js/rest_api.js"></script>

  </body>
</html>
